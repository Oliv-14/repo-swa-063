<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktikum Azure Static Web Apps</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #1f4e79; margin-bottom: 16px; font-size: 2rem; }
        p { color: #333; line-height: 1.6; margin-bottom: 12px; }
        .badge {
            display: inline-block;
            background: #e8f0fe;
            color: #1a73e8;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin: 4px;
            font-weight: 500;
        }
        footer {
            margin-top: 24px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Praktikum Azure Static Web Apps</h1>
        <p>Halaman ini berhasil di-deploy menggunakan <strong>Azure Static Web Apps</strong>.</p>
        
        <div style="margin: 16px 0;">
            <span class="badge">Layanan: Azure Static Web Apps</span>
            <span class="badge">Deployment: GitHub Actions</span>
            <span class="badge">Status: ✅ Live</span>
        </div>

        <footer>
            <p>Terakhir diperbarui: <span id="lastUpdated"></span></p>
        </footer>
    </div>

    <script>
        document.getElementById('lastUpdated').textContent = new Date().toLocaleDateString('id-ID', {
            day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit'
        });
    </script>
</body>
</html>
